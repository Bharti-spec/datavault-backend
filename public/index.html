<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datavault</title>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="loginPage">
    <h1>🔐 Datavault</h1>

    <input type="email" id="email" placeholder="Email" />
    <input type="password" id="password" placeholder="Password" />
    <button onclick="login()">Login</button>
    <button onclick="register()">Register</button>

    <div id="loginMsg"></div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;">
    <h1>📁 Datavault</h1>

    <input type="file" id="fileInput" onchange="uploadFile()" />
    <div id="filesList"></div>

    <button onclick="logout()">Logout</button>
</div>

<script>
const API = 'https://datavault-backend-5viv.onrender.com'
const API_KEY = 'd07621241a2a33c77247c7d5b88594e1'

let token = localStorage.getItem('token')

if (token) showDashboard()

// ================= LOGIN =================
async function login() {
    const email = document.getElementById('email').value
    const password = document.getElementById('password').value

    const res = await fetch(`${API}/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
    })

    const data = await res.json()

    if (res.ok) {
        localStorage.setItem('token', data.token)
        token = data.token
        showDashboard()
    } else {
        alert(data.message)
    }
}

// ================= REGISTER =================
async function register() {
    const email = document.getElementById('email').value
    const password = document.getElementById('password').value

    const res = await fetch(`${API}/register`, {   // ✅ FIXED
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ naam: 'User', email, password })
    })

    const data = await res.json()
    alert(data.message)
}

// ================= UPLOAD =================
async function uploadFile() {
    const file = document.getElementById('fileInput').files[0]
    if (!file) return

    const formData = new FormData()
    formData.append('file', file)

    const res = await fetch(`${API}/upload`, {
        method: 'POST',
        headers: {
            'Authorization': `Bearer ${token}`,
            'x-api-key': API_KEY   // ✅ FIXED
        },
        body: formData
    })

    const data = await res.json()
    alert(data.message)

    loadFiles()
}

// ================= LOAD FILES =================
async function loadFiles() {
    const res = await fetch(`${API}/files`, {
        headers: {
            'Authorization': `Bearer ${token}`,
            'x-api-key': API_KEY   // ✅ FIXED
        }
    })

    const files = await res.json()

    const list = document.getElementById('filesList')

    if (files.length === 0) {
        list.innerHTML = 'No files'
        return
    }

    list.innerHTML = files.map(f => `
        <div>
            ${f.filename}
            <a href="${f.url}" target="_blank">Open</a>
        </div>
    `).join('')
}

// ================= UI =================
function showDashboard() {
    document.getElementById('loginPage').style.display = 'none'
    document.getElementById('dashboard').style.display = 'block'
    loadFiles()
}

function logout() {
    localStorage.removeItem('token')
    location.reload()
}
</script>

</body>
</html>
