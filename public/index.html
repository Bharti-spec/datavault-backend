<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datavault</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: Arial, sans-serif;
            background: #0f0f1a;
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: #1a1a2e;
            padding: 40px;
            border-radius: 16px;
            width: 400px;
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.3);
        }

        h1 {
            text-align: center;
            margin-bottom: 8px;
            color: #6366f1;
            font-size: 28px;
        }

        p.subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 16px;
            background: #0f0f1a;
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
            font-size: 15px;
        }

        input:focus {
            outline: none;
            border-color: #6366f1;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 10px;
        }

        button:hover { background: #4f46e5; }

        .message {
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 14px;
        }

        .success { background: #1a3a1a; color: #4ade80; }
        .error { background: #3a1a1a; color: #f87171; }

        /* Dashboard */
        #dashboard { display: none; }

        .upload-area {
            border: 2px dashed #6366f1;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            margin: 20px 0;
            cursor: pointer;
        }

        .upload-area:hover { background: #0f0f1a; }

        .files-list { margin-top: 20px; }

        .file-item {
            background: #0f0f1a;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        .file-item a {
            color: #6366f1;
            text-decoration: none;
        }

        .logout-btn {
            background: #333;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<!-- LOGIN PAGE -->
<div class="container" id="loginPage">
    <h1>🔐 Datavault</h1>
    <p class="subtitle">Apna secure storage</p>

    <input type="email" id="email" placeholder="Email" />
    <input type="password" id="password" placeholder="Password" />
    <button onclick="login()">Login Karo</button>
    <button onclick="register()" style="background:#333">Naya Account Banao</button>

    <div id="loginMsg"></div>
</div>

<!-- DASHBOARD -->
<div class="container" id="dashboard">
    <h1>📁 Datavault</h1>
    <p class="subtitle" id="welcomeMsg">Welcome!</p>

    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        📤 File Upload Karo<br>
        <small style="color:#888">Click karo ya file drag karo</small>
        <input type="file" id="fileInput" style="display:none" onchange="uploadFile()">
    </div>

    <div class="files-list" id="filesList">
        <p style="color:#888; text-align:center">Koi file nahi hai abhi</p>
    </div>

    <button class="logout-btn" onclick="logout()">🚪 Logout</button>
</div>

<script>
    const API = 'https://datavault-backend-5viv.onrender.com'
    let token = localStorage.getItem('token')

    // Page load pe check karo
    if (token) showDashboard()

    async function login() {
        const email = document.getElementById('email').value
        const password = document.getElementById('password').value

        const res = await fetch(`${API}/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        })

        const data = await res.json()

        if (res.ok) {
            localStorage.setItem('token', data.token)
            token = data.token
            showMessage('loginMsg', 'Login ho gaya! 🎉', 'success')
            setTimeout(showDashboard, 1000)
        } else {
            showMessage('loginMsg', data.message, 'error')
        }
    }

    async function register() {
        const naam = 'User'
        const email = document.getElementById('email').value
        const password = document.getElementById('password').value

        const res = await fetch(`${API}/users`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ naam, email, password })
        })

        const data = await res.json()
        if (res.ok) {
            showMessage('loginMsg', 'Account ban gaya! Ab login karo 🎉', 'success')
        } else {
            showMessage('loginMsg', data.message, 'error')
        }
    }

    async function uploadFile() {
        const file = document.getElementById('fileInput').files[0]
        if (!file) return

        const formData = new FormData()
        formData.append('file', file)

        const res = await fetch(`${API}/upload`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}` },
            body: formData
        })

        const data = await res.json()
        if (res.ok) {
            alert('File upload ho gayi! 🎉')
            loadFiles()
        }
    }

    async function loadFiles() {
        const res = await fetch(`${API}/files`, {
            headers: { 'Authorization': `Bearer ${token}` }
        })
        const files = await res.json()
        const list = document.getElementById('filesList')

        if (files.length === 0) {
            list.innerHTML = '<p style="color:#888; text-align:center">Koi file nahi hai abhi</p>'
            return
        }

        list.innerHTML = files.map(f => `
            <div class="file-item">
                <span>📄 ${f.filename}</span>
                <a href="${f.url}" target="_blank">Dekho</a>
            </div>
        `).join('')
    }

    function showDashboard() {
        document.getElementById('loginPage').style.display = 'none'
        document.getElementById('dashboard').style.display = 'block'
        document.getElementById('welcomeMsg').textContent = 'Tumhari files 👇'
        loadFiles()
    }

    function logout() {
        localStorage.removeItem('token')
        token = null
        document.getElementById('loginPage').style.display = 'flex'
        document.getElementById('dashboard').style.display = 'none'
    }

    function showMessage(id, msg, type) {
        const el = document.getElementById(id)
        el.textContent = msg
        el.className = `message ${type}`
    }
</script>

</body>
</html>
